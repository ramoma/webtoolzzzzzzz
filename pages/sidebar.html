<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="theme.css">
    <style>
        .fc-sidebar {
            position: fixed;
            top: 56px;
            left: 0;
            bottom: 0;
            width: 216px;
            z-index: 1035;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 12px;
            transition: transform .25s ease;
        }

        @media(max-width:991px) {
            .fc-sidebar {
                transform: translateX(-216px);
            }

            .fc-sidebar.open {
                transform: translateX(0);
            }
        }

        .profile-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 14px;
            margin-bottom: 10px;
            text-align: center;
        }

        .profile-av {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, rgba(0, 245, 255, .3), rgba(238, 90, 189, .2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Lalezar', cursive;
            font-size: 18px;
            color: var(--accent);
            margin: 0 auto 10px;
        }

        .profile-name {
            font-family: 'Lalezar', cursive;
            font-size: 15px;
        }

        .profile-spec {
            font-size: 11px;
            color: var(--muted);
            margin-top: 3px;
        }

        .profile-rating {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 8px;
            font-size: 12px;
            color: var(--accent4);
            font-weight: 600;
        }

        .nav-sec {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--muted);
            text-transform: uppercase;
            padding: 14px 10px 5px;
        }

        .nav-lnk {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            font-size: 13.5px;
            color: var(--muted);
            cursor: pointer;
            transition: .15s;
            position: relative;
            user-select: none;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .nav-lnk:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .nav-lnk.active {
            background: var(--surface2);
            color: var(--text);
            font-weight: 600;
        }

        .nav-lnk.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            bottom: 6px;
            width: 3px;
            background: var(--accent);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            z-index: 1034;
        }

        .sidebar-overlay.show {
            display: block;
        }
    </style>
</head>


<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <nav class="fc-sidebar" id="sidebar">
        <div class="profile-card">
            <div class="profile-av">CM</div>
            <div class="profile-name">Coachy</div>
            <div class="profile-spec">Strength & Conditioning</div>
            <div class="profile-rating">★ 4.9 <span style="color:var(--muted);font-size:11px;">(42 reviews)</span></div>
        </div>
        <div class="nav-sec">Main</div>
        <button class="nav-lnk active" data-page="dashboard"><span>⬡</span>Dashboard</button>
        <button class="nav-lnk" data-page="sessions"><span>📅</span>My Sessions</button>
        <button class="nav-lnk" data-page="members"><span>👥</span>My Members</button>
        <div class="nav-sec">Personal</div>
        <button class="nav-lnk" data-page="profile"><span>👤</span>My Profile</button>
        <button class="nav-lnk" data-page="earnings"><span>💰</span>Earnings</button>
        <button class="nav-lnk" data-page="settings"><span>⚙️</span>Settings</button>
        <div class="nav-sec">View</div>
        <button class="nav-lnk" data-page="calendar"><span>🗓️</span>Calendar</button>
    </nav>
</body>
<script>
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('show');
    }
    document.getElementById('sidebarToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('show');
    });
    document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar)
</script>

</html>
