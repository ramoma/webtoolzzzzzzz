<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A's Gym Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&display=swap" rel="stylesheet">

    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Lalezar', system-ui;
            overflow: hidden;
        }

        /* Gradient Overlay Background */
        .bg-overlay {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, rgba(235, 87, 87, 0.7), rgba(214, 51, 132, 0.7)), 
                        url('../images/hero_banner_2.jpg');
            background-size: cover;
            background-position: center;
        }

        /* The Custom Card */
        .login-card {
            background-color: #D9D9D9; /* Matching the grey in your image */
            padding: 4rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        /* Input Customization */
        .form-label {
            font-size: 1.2rem;
            margin-bottom: 2px;
            color: #000;
        }

        .form-control {
            background-color: #E0E0E0;
            border: 1px solid #999;
            border-radius: 0; /* Square inputs like the image */
            padding: 10px;
        }

        .form-control:focus {
            background-color: #E0E0E0;
            border-color: #F851BA;
            box-shadow: none;
        }

        /* The Pink Button */
        .btn-gym {
            background-color: #F851BA;
            color: #000;
            border: none;
            border-radius: 0;
            font-size: 1.5rem;
            padding: 10px;
            width: 100%;
            margin-top: 1rem;
            transition: opacity 0.2s;
            button-shadow: 0 5px 15px rgba(248, 81, 186, 0.4);
        }

        .btn-gym:hover {
            background-color: #e045a5;
            color: #000;
        }

        /* Checkbox styling */
        .form-check-label {
            font-size: 0.9rem;
            vertical-align: middle;
        }

        .footer-links a {
            color: #000;
            text-decoration: none;
            font-size: 0.8rem;
            margin: 0 5px;
        }

        /* Logo text styling to mimic the "A'S GYM" */
        .logo-header {
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="bg-overlay">
        <div class="login-card text-center">
            
            <div class="logo-header">
                <img src="../images/image-removebg-preview.png" alt="Logo" class="img-fluid">
            </div>

            <form>
                <div class="mb-3 text-start">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" required>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" required>
                </div>

                <div class="mb-4 text-start form-check">
                    <input type="radio" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Remember Me</label>
                </div>

                <button type="submit" class="btn btn-gym">Log In</button>
                
            </form>

            <div class="footer-links mt-3">
                <a href="#">Forgot Password?</a>
                <a href="#">Forgot Password</a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
