<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A's Gym - Password Recovery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #d35400, #c0392b, #8e44ad);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-custom {
            background-color: #e0e0e0;
            border-radius: 0;
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .btn-pink {
            background-color: #ff4db8;
            color: white;
            border-radius: 0;
            width: 100%;
            font-weight: bold;
        }
        .btn-pink:hover { background-color: #e03ca3; color: white; }
        .otp-input {
            width: 40px;
            height: 50px;
            text-align: center;
            margin: 0 2px;
            border: 1px solid #999;
        }
        .hidden { display: none; }
        .logo-text { font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="step1" class="card-custom">
        <h2 class="logo-text">A'S GYM</h2>
        <p class="mt-3 fw-bold">Forgot Password</p>
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Enter Email</label>
            <input type="email" id="emailInput" class="form-control rounded-0">
        </div>
        <button onclick="showStep(2)" class="btn btn-pink">Submit</button>
    </div>

    <div id="step2" class="card-custom hidden">
        <h2 class="logo-text">A'S GYM</h2>
        <p class="mt-3 fw-bold">Account Verification</p>
        <p class="small">Enter Code Here</p>
        <div class="d-flex justify-content-center mb-4">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
            <input type="text" maxlength="1" class="otp-input">
        </div>
        <button onclick="showStep(3)" class="btn btn-pink mb-2">Verify Code</button>
        <a href="#" class="d-block small text-dark text-decoration-none">Resend Code</a>
    </div>

    <div id="step3" class="card-custom hidden">
        <h2 class="logo-text">A'S GYM</h2>
        <p class="mt-3 fw-bold">Reset Password</p>
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold">New Password</label>
            <input type="password" class="form-control rounded-0">
        </div>
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Confirm New Password</label>
            <input type="password" class="form-control rounded-0">
        </div>
        <button onclick="alert('Password Reset Successful!')" class="btn btn-pink">Reset Password</button>
    </div>

    <script>
        function showStep(step) {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step' + step).classList.remove('hidden');
        }
    </script>
</body>
</html>
